languageCode = "en"
defaultContentLanguage = "en"
enableRobotsTXT = true
enableEmoji = true

theme = "almeida-cv"
disableKinds = ["section", "taxonomy", "term", "RSS", "sitemap"]

baseURL = "https://example.com/"
title = "Example - CV"
#googleAnalytics = ""

[params]
enableMetaTags = true
colorLight = "#fff"
colorDark = "#666"
colorPageBackground = "#ddd"
colorPrimary = "#e3bfb8"
colorSecondary = "#aaa"
colorIconPrimary = "#fff"
colorIconBackground = "#e3bfb8"
colorRightColumnBackground = "#f5f5f5"
colorRightColumnHeadingText = "#666"
colorRightColumnBodyText = "#666"
colorRightColumnIconPrimary = "#fff"
colorRightColumnIconBackground = "#e3bfb8"
pages = 2
# Set this param to 'true' to swap the bar positions
swapColumns = true
# Ordered sections for left column (regular section style)
section_order = ["profile", "thesis", "experience", "projects", "education", "publications", "references"]
# Ordered sections for right column (sideSection style)
side_section_order = ["avatar", "name", "contacts", "profile", "skills", "interests"]
footerNote = "2020 © by Inês Almeida   |   ines-almeida.com"

# Left column (content__left) defaults and sizing
[params.section]
percent = 70
margin = "0 0 0 0"
padding = "1rem 2rem 3rem 1rem"

# Right column (content__right) defaults and sizing
[params.side_section]
percent = 28
margin = "0"
padding = "1rem 1rem"

# Global defaults for all badge containers/items in all sections
[params.badges]
badges_margin = "-2rem 0 0 0"
badges_padding = "0"
badge_margin = "0 0 0 0"
badge_padding = "0 0.4rem 0 0.4rem"

# Per-section overrides (wrapper)
[params.avatar]
margin = "0 0 0 0"
padding = "0 0 0 0"

[params.name]
margin = "0 0 0 0"
padding = "0 0 0 0"

[params.contacts]
margin = "0 0 2rem 0"
padding = "0 0 0 0"

[params.diplomas]
# display_name = "Diplomas"
margin = "0 0 2rem 0"
child_margin = "0 0 0.5rem 0"

[params.skills]
# display_name = "Skills"
margin = "0 0 0 0"
padding = "0 0 2rem 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"

[params.languages]
# display_name = "Languages"
margin = "0 0 0 0"
padding = "0 0 2rem 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"

[params.interests]
# display_name = "Interests"
margin = "0 0 0 0"
padding = "0 0 2rem 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"

[params.profile]
# display_name = "Profile"
margin = "0 0 0 0"
padding = "0 0 2rem 0"

[params.education]
# display_name = "Education"
margin = "0 0 2rem 0"
padding = "0 0 0 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"

[params.experience]
# display_name = "Experience"
margin = "0 0 0 0"
padding = "0 0 0 0"
child_margin = "0 0 1rem 0"
child_padding = "0 0 0 0"
# Optional per-section badge spacing override
# badges_margin = "0.5rem 0"
# badges_padding = "0"
# badge_margin = "0 0 0 0.35rem"
# badge_padding = "0.1rem 0.6rem"

[params.projects]
# display_name = "Projects"
margin = "0 0 2rem 0"
padding = "0 0 0 0"
child_margin = "0 0 1rem 0"
child_padding = "0 0 0 0"

[params.references]
# display_name = "References"
margin = "0 0 2rem 0"
padding = "0 0 0 0"
child_margin = "0 0 1rem 0"
child_padding = "0 0 0 0"

[params.publications]
display_name = "Journal/Conference Publications"
margin = "0 0 2rem 0"
padding = "0 0 0 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"

[params.thesis]
display_name = "PhD Thesis"
margin = "0 0 2rem 0"
padding = "0 0 0 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"
# Optional per-section badge spacing override
# badges_margin = "0.5rem 0"
# badges_padding = "0"
# badge_margin = "0 0 0 0.35rem"
# badge_padding = "0.1rem 0.6rem"