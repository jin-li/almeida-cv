slug = "cv-de"
title = "CV German"
languageCode = "de"

[params]
enableMetaTags = true
colorLight = "#ffffff"
colorDark = "#444444"
colorPageBackground = "#efefef"
colorPrimary = "#c9a56a"
colorSecondary = "#999999"
colorIconPrimary = "#ffffff"
colorIconBackground = "#c9a56a"
colorRightColumnBackground = "#f7f7f7"
colorRightColumnHeadingText = "#444444"
colorRightColumnBodyText = "#555555"
colorRightColumnIconPrimary = "#ffffff"
colorRightColumnIconBackground = "#c9a56a"
pages = 1
footerNote = "2026 © CV German"
swapColumns = true

section_order = ["profile", "experience", "education", "publications"]
side_section_order = ["name", "avatar", "contacts", "skills", "languages"]

# Left column (content__left) defaults and sizing
[params.section]
percent = 70
margin = "0 0 0 0"
padding = "1rem 2rem 3rem 1rem"

# Right column (content__right) defaults and sizing
[params.side_section]
percent = 28
margin = "0"
padding = "1rem 1rem"

# Per-section overrides (wrapper)
[params.avatar]
margin = "0 0 0 0"
padding = "0 0 0 0"

[params.name]
margin = "0 0 0 0"
padding = "0 0 0 0"

[params.contacts]
margin = "0 0 1rem 0"
padding = "0 0 0 0"

[params.diplomas]
margin = "0 0 2rem 0"
child_margin = "1rem 0 0 0"

[params.skills]
margin = "0 0 0 0"
padding = "0 0 2rem 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"

[params.languages]
margin = "0 0 0 0"
padding = "0 0 2rem 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"

[params.interests]
margin = "0 0 0 0"
padding = "0 0 2rem 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"

[params.profile]
margin = "0 0 0 0"
padding = "0 0 2rem 0"

[params.education]
margin = "0 0 2rem 0"
padding = "0 0 0 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"

[params.experience]
margin = "0 0 0 0"
padding = "0 0 0 0"
child_margin = "0 0 1rem 0"
child_padding = "0 0 0 0"

[params.references]
margin = "0 0 2rem 0"
padding = "0 0 0 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"

[params.publications]
margin = "0 0 0 0"
padding = "0 0 0 0"
child_margin = "0 0 0 0"
child_padding = "0 0 0 0"