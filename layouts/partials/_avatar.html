{{ if .Avatar.Photo }}
    {{ $isSide := false }}

    {{ if isset . "_isSide" }}
        {{ $isSide = ._isSide }}
    {{ end }}

    {{ $wrapperClass := "section" }}

    {{ if $isSide }}
        {{ $wrapperClass = "sideSection" }}
    {{ end }}

    <div id="avatar" class="{{ $wrapperClass }} avatar">
        <div class="avatar__container">
            <img class="avatar__img" src="{{ .Avatar.Photo }}" alt="photo of me">
        </div>
    </div>
{{ end }}
